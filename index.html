<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptext — Авторский Блог Кошмаров</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #13131a;
            --accent-red: #ff3333;
            --accent-purple: #9d4edd;
            --text-main: #f0f0f5;
            --text-muted: #8a8a98;
            --glow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(26, 11, 44, 0.4) 0%, rgba(10, 10, 12, 1) 80%);
            z-index: -1;
        }

        header {
            background-color: var(--panel-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-red);
            box-shadow: 0 4px 20px rgba(255, 51, 51, 0.15);
        }

        .logo { font-size: 28px; font-weight: bold; color: var(--accent-red); text-shadow: var(--glow); letter-spacing: 2px; cursor: pointer; }
        .logo span { color: var(--accent-purple); text-shadow: 0 0 10px rgba(157, 78, 221, 0.6); }

        .container { max-width: 1000px; width: 100%; margin: 40px auto; padding: 0 20px; flex: 1; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease-out; }

        .btn {
            background: linear-gradient(45deg, var(--accent-red), #b30000);
            color: white; border: none; padding: 10px 20px; border-radius: 5px;
            cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--glow); }
        .btn-secondary { background: transparent; border: 2px solid var(--accent-purple); color: var(--accent-purple); }
        .btn-secondary:hover { background: var(--accent-purple); color: white; }
        .btn-danger { background: #551111; border: 1px solid var(--accent-red); color: white; }
        .btn-danger:hover { background: var(--accent-red); }

        .story-form {
            background-color: var(--panel-bg); padding: 30px; border-radius: 10px;
            border-left: 4px solid var(--accent-red); margin-bottom: 40px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; background-color: #0b0b0f; border: 1px solid #3a3a4a;
            border-radius: 6px; color: white; font-size: 16px; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-red); }

        .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .story-card {
            background-color: var(--panel-bg); border: 1px solid #22222c; border-radius: 10px;
            padding: 25px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s;
        }
        .story-card:hover { border-color: var(--accent-red); transform: translateY(-5px); box-shadow: 0 8px 25px rgba(255, 51, 51, 0.1); }
        .story-title { color: var(--accent-red); font-size: 20px; margin-bottom: 8px; font-weight: bold; }
        .story-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; }
        .story-snippet { color: #b3b3ba; font-size: 14px; line-height: 1.5; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .story-stats { display: flex; gap: 15px; font-size: 13px; color: var(--text-muted); border-top: 1px solid #1f1f29; padding-top: 12px; }

        .full-story { background-color: var(--panel-bg); padding: 40px; border-radius: 12px; border: 1px solid #22222c; }
        .full-story-content { font-size: 17px; line-height: 1.7; color: #e1e1e6; white-space: pre-line; margin: 25px 0; }
        
        .action-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .like-btn { background: #1c1c24; border: 1px solid #3a3a4a; color: var(--text-main); padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .like-btn.liked { background: rgba(255, 51, 51, 0.2); border-color: var(--accent-red); color: var(--accent-red); }

        .comments-section { margin-top: 40px; }
        .comment-item { background: #181822; padding: 15px 20px; border-radius: 8px; margin-bottom: 12px; border-left: 3px solid var(--accent-purple); }
        .comment-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }

        .loading-text, .no-stories { text-align: center; color: var(--text-muted); padding: 40px; font-style: italic; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showFeed()">CRYPT<span>EXT</span></div>
        <div id="author-badge">
            <button class="btn btn-secondary" onclick="loginAsAuthor()">Войти как Автор</button>
        </div>
    </header>

    <div class="container">

        <main id="screen-feed" class="screen active">
            <div id="admin-panel" style="display: none;">
                <div class="story-form">
                    <h3 id="form-action-title" style="color: var(--accent-red); margin-bottom: 15px;">Добавить новую легенду</h3>
                    <input type="hidden" id="edit-story-id">
                    <div class="form-group">
                        <label>Заголовок истории</label>
                        <input type="text" id="story-title" placeholder="Введите мрачный заголовок">
                    </div>
                    <div class="form-group">
                        <label>Текст кошмара</label>
                        <textarea id="story-text" rows="7" placeholder="Опишите, что произошло..."></textarea>
                    </div>
                    <button class="btn" id="btn-save-story" onclick="saveStory()">Опубликовать</button>
                    <button class="btn btn-secondary" id="btn-cancel-edit" style="display:none;" onclick="cancelEdit()">Отмена</button>
                </div>
            </div>

            <h2 style="margin-bottom: 20px; letter-spacing: 1px;">Мрачные Хроники</h2>
            <div id="stories-container" class="stories-grid">
                <div class="loading-text">Открываем врата архивов...</div>
            </div>
        </main>

        <section id="screen-story" class="screen">
            <div class="action-bar">
                <button class="btn btn-secondary" onclick="showFeed()">← Назад в ленту</button>
                <button class="btn" id="admin-edit-btn" style="display:none;">Редактировать</button>
                <button class="btn btn-danger" id="admin-delete-btn" style="display:none;">Удалить историю</button>
            </div>
            <div id="full-story-render"></div>
        </section>

    </div>

    <script>
        // --- НАСТРОЙКИ SUPABASE ---
        const SUPABASE_URL = 'https://rlscraalizkoqysccteo.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsc2NyYWFsaXprb3F5c2NjdGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMjgzNzAsImV4cCI6MjA5NDkwNDM3MH0.S4LEl8T8Ousp2dT--yWFqhRvVJCzgVYe4Vc21IvHsnM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Секретный пароль для тебя (можешь поменять на любой)
        const SECRET_PASSWORD = "1234"; 

        let isAuthor = localStorage.getItem('cryptext_is_author') === 'true';
        let activeStoryId = null;
        const myIpMock = localStorage.getItem('cryptext_ip') || Math.random().toString(36).substring(3);
        localStorage.setItem('cryptext_ip', myIpMock);

        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()}`;
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0,0);
        }

        function showFeed() {
            activeStoryId = null;
            switchScreen('screen-feed');
            cancelEdit();
            updateUI();
        }

        // Вход по секретному паролю
        function loginAsAuthor() {
            const pass = prompt("Введите секретный пароль создателя:");
            if (pass === SECRET_PASSWORD) {
                isAuthor = true;
                localStorage.setItem('cryptext_is_author', 'true');
                alert("Добро пожаловать, Создатель.");
                updateUI();
            } else if (pass !== null) {
                alert("Доступ заблокирован. Чужакам здесь не рады.");
            }
        }

        function logoutAuthor() {
            isAuthor = false;
            localStorage.removeItem('cryptext_is_author');
            showFeed();
        }

        function updateUI() {
            const badge = document.getElementById('author-badge');
            const adminPanel = document.getElementById('admin-panel');

            if (isAuthor) {
                badge.innerHTML = `<span style="color:var(--accent-red); font-weight:bold; margin-right:15px;">Режим Автора</span><button class="btn btn-secondary" onclick="logoutAuthor()">Выйти</button>`;
                adminPanel.style.display = 'block';
            } else {
                badge.innerHTML = `<button class="btn btn-secondary" onclick="loginAsAuthor()">Войти как Автор</button>`;
                adminPanel.style.display = 'none';
            }

            if (activeStoryId) {
                renderStoryPage(activeStoryId);
            } else {
                loadStories();
            }
        }

        // ЗАГРУЗКА ЛЕНТЫ
        async function loadStories() {
            const container = document.getElementById('stories-container');
            if (!container) return;

            try {
                const [storiesRes, commentsRes, likesRes, viewsRes] = await Promise.all([
                    _supabase.from('stories').select('*').order('id', { ascending: false }),
                    _supabase.from('comments').select('*'),
                    _supabase.from('likes').select('*'),
                    _supabase.from('views').select('*')
                ]);

                const stories = storiesRes.data || [];
                if (stories.length === 0) {
                    container.innerHTML = '<div class="no-stories">Свитков пока нет. Напишите первую историю!</div>';
                    return;
                }

                container.innerHTML = stories.map(story => {
                    const cCount = (commentsRes.data || []).filter(c => c.story_id === story.id).length;
                    const lCount = (likesRes.data || []).filter(l => l.story_id === story.id).length;
                    const vCount = (viewsRes.data || []).filter(v => v.story_id === story.id).length;

                    return `
                        <div class="story-card" onclick="openStory(${story.id})">
                            <div>
                                <div class="story-title">${escapeHTML(story.title)}</div>
                                <div class="story-meta">Опубликовано: ${formatDate(story.created_at)}</div>
                                <div class="story-snippet">${escapeHTML(story.content)}</div>
                            </div>
                            <div class="story-stats">
                                <span>👁️ ${vCount}</span>
                                <span>❤️ ${lCount}</span>
                                <span>💬 ${cCount}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<div class="no-stories" style="color:var(--accent-red)">Ошибка подключения.</div>';
            }
        }

        async function openStory(id) {
            activeStoryId = id;
            switchScreen('screen-story');
            updateUI();

            // Засчитываем просмотр
            try {
                if (!sessionStorage.getItem(`v_${id}`)) {
                    await _supabase.from('views').insert([{ story_id: id, viewer_session: myIpMock }]);
                    sessionStorage.setItem(`v_${id}`, 'true');
                    updateUI();
                }
            } catch(e){}
        }

        // СТРАНИЦА ИСТОРИИ
        async function renderStoryPage(id) {
            const renderContainer = document.getElementById('full-story-render');
            const editBtn = document.getElementById('admin-edit-btn');
            const deleteBtn = document.getElementById('admin-delete-btn');

            if (isAuthor) {
                editBtn.style.display = 'inline-block';
                deleteBtn.style.display = 'inline-block';
                editBtn.onclick = () => startEdit(id);
                deleteBtn.onclick = () => deleteStory(id);
            } else {
                editBtn.style.display = 'none';
                deleteBtn.style.display = 'none';
            }

            try {
                const [storyRes, commentsRes, likesRes, viewsRes] = await Promise.all([
                    _supabase.from('stories').select('*').eq('id', id).maybeSingle(),
                    _supabase.from('comments').select('*').eq('story_id', id).order('id', { ascending: true }),
                    _supabase.from('likes').select('*').eq('story_id', id),
                    _supabase.from('views').select('*').eq('story_id', id)
                ]);

                const story = storyRes.data;
                if (!story) {
                    renderContainer.innerHTML = '<p>История удалена.</p>';
                    return;
                }

                const comments = commentsRes.data || [];
                const likes = likesRes.data || [];
                const isLiked = likes.some(l => l.viewer_ip === myIpMock);

                renderContainer.innerHTML = `
                    <article class="full-story">
                        <h1 class="story-title" style="font-size:32px;">${escapeHTML(story.title)}</h1>
                        <div class="story-meta" style="margin: 10px 0 20px 0;">Дата: ${formatDate(story.created_at)} • Просмотров: ${viewsRes.data?.length || 0}</div>
                        <div class="full-story-content">${escapeHTML(story.content)}</div>
                        
                        <div style="margin: 30px 0 20px 0; padding-top:20px; border-top:1px solid #22222c;">
                            <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${story.id}, ${isLiked})">
                                ❤️ Оценить <span>(${likes.length})</span>
                            </button>
                        </div>

                        <div class="comments-section">
                            <h3 style="margin-bottom:20px;">Обсуждение (${comments.length})</h3>
                            
                            <div class="story-form" style="padding:20px; margin-bottom:25px; border-left-color: var(--accent-purple);">
                                <div class="form-group" style="margin-bottom:12px;">
                                    <input type="text" id="comment-author" placeholder="Ваше имя/никнейм" style="padding:8px;">
                                </div>
                                <div class="form-group" style="margin-bottom:12px;">
                                    <textarea id="comment-text" rows="2" placeholder="Оставить комментарий..." style="padding:8px;"></textarea>
                                </div>
                                <button class="btn btn-secondary" onclick="postComment(${story.id})">Отправить</button>
                            </div>

                            <div>
                                ${comments.length === 0 ? '<p style="color:var(--text-muted); font-style:italic;">Здесь пока пусто...</p>' : 
                                    comments.map(c => `
                                        <div class="comment-item">
                                            <div class="comment-header">
                                                <span style="color:var(--accent-purple); font-weight:bold;">${escapeHTML(c.author)}</span>
                                                <span>${formatDate(c.created_at)}</span>
                                            </div>
                                            <div style="font-size:15px; color:#cfcfd6;">${escapeHTML(c.text)}</div>
                                        </div>
                                    `).join('')
                                }
                            </div>
                        </div>
                    </article>
                `;
            } catch(e) {
                renderContainer.innerHTML = '<p>Ошибка сборки страницы.</p>';
            }
        }

        // СОХРАНЕНИЕ / ИЗМЕНЕНИЕ ИСТОРИИ (ТОЛЬКО ДЛЯ ТЕБЯ)
        async function saveStory() {
            if (!isAuthor) return;

            const title = document.getElementById('story-title').value.trim();
            const content = document.getElementById('story-text').value.trim();
            const editId = document.getElementById('edit-story-id').value;

            if (!title || !content) return alert("Заполните поля!");

            try {
                if (editId) {
                    // Редактирование
                    await _supabase.from('stories').update({ title, content }).eq('id', editId);
                    alert("История успешно изменена!");
                } else {
                    // Создание новой
                    await _supabase.from('stories').insert([{ title, content }]);
                    alert("История опубликована!");
                }
                showFeed();
            } catch(e) { alert("Ошибка сохранения"); }
        }

        function startEdit(id) {
            _supabase.from('stories').select('*').eq('id', id).maybeSingle().then(res => {
                if(res.data) {
                    switchScreen('screen-feed');
                    document.getElementById('edit-story-id').value = res.data.id;
                    document.getElementById('story-title').value = res.data.title;
                    document.getElementById('story-text').value = res.data.content;
                    document.getElementById('form-action-title').innerText = "Редактировать историю";
                    document.getElementById('btn-save-story').innerText = "Сохранить изменения";
                    document.getElementById('btn-cancel-edit').style.display = "inline-block";
                }
            });
        }

        function cancelEdit() {
            document.getElementById('edit-story-id').value = "";
            document.getElementById('story-title').value = "";
            document.getElementById('story-text').value = "";
            document.getElementById('form-action-title').innerText = "Поведай свой кошмар...";
            document.getElementById('btn-save-story').innerText = "Опубликовать";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        async function deleteStory(id) {
            if (!isAuthor) return;
            if (confirm("Вы уверены, что хотите стереть эту историю навсегда?")) {
                await _supabase.from('stories').delete().eq('id', id);
                showFeed();
            }
        }

        // ЛАЙКИ И КОММЕНТЫ ЧИТАТЕЛЕЙ
        async function toggleLike(id, isLiked) {
            try {
                if (isLiked) {
                    await _supabase.from('likes').delete().eq('story_id', id).eq('viewer_ip', myIpMock);
                } else {
                    await _supabase.from('likes').insert([{ story_id: id, viewer_ip: myIpMock }]);
                }
                updateUI();
            } catch(e){}
        }

        async function postComment(id) {
            const author = document.getElementById('comment-author').value.trim() || "Анонимный призрак";
            const text = document.getElementById('comment-text').value.trim();
            if (!text) return alert("Напишите текст комментария!");

            try {
                await _supabase.from('comments').insert([{ story_id: id, author, text }]);
                updateUI();
            } catch(e){}
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        updateUI();
    </script>
</body>
</html>
