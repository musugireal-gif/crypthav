<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptext — Платформа Страшных Историй</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c; --panel-bg: #13131a; --accent-red: #ff3333; 
            --accent-purple: #9d4edd; --accent-gold: #ffd700; --text-main: #f0f0f5; 
            --text-muted: #8a8a98; --sidebar-width: 280px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; }
        aside { width: var(--sidebar-width); background-color: var(--panel-bg); height: 100vh; position: fixed; border-right: 2px solid var(--accent-red); padding: 30px 20px; }
        .logo { font-size: 26px; font-weight: bold; color: var(--accent-red); cursor: pointer; margin-bottom: 40px; text-align: center; }
        .menu-nav { display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { background: #181822; color: var(--text-main); border: 1px solid #2d2d3d; padding: 14px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s; }
        .nav-btn.active { border-color: var(--accent-red); background: rgba(255, 51, 51, 0.05); }
        .btn-create { background: var(--accent-red); color: white; border: none; text-align: center; }
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; }
        .screen { display: none; } .screen.active { display: block; }
        .story-card { background-color: var(--panel-bg); border: 1px solid #22222c; padding: 25px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
        .story-title { color: var(--accent-red); font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .btn-fav { padding: 10px 20px; border-radius: 20px; cursor: pointer; border: 1px solid #3a3a4a; background: #1c1c24; color: var(--accent-gold); margin-top: 10px; }
        .btn-fav.active { background: rgba(255, 215, 0, 0.1); border-color: var(--accent-gold); }
    </style>
</head>
<body>

    <aside>
        <div class="logo" onclick="showFeed()">CRYPT<span>EXT</span></div>
        <nav class="menu-nav">
            <button id="nav-feed" class="nav-btn active" onclick="showFeed()">👁️ Лента</button>
            <button id="nav-favs" class="nav-btn" onclick="showFavorites()">⭐ Избранное</button>
            <button class="nav-btn btn-create" onclick="showCreateScreen()">✍️ Создать</button>
        </nav>
    </aside>

    <main class="main-content">
        <div id="screen-feed" class="screen active"><h2>Лента</h2><div id="stories-container"></div></div>
        <div id="screen-favs" class="screen"><h2>Избранное</h2><div id="favs-container"></div></div>
        <div id="screen-create" class="screen">
            <input type="text" id="story-author" placeholder="Автор" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="story-title" placeholder="Название" style="width:100%; padding:10px; margin-bottom:10px;">
            <textarea id="story-text" rows="10" style="width:100%; padding:10px; margin-bottom:10px;"></textarea>
            <button class="nav-btn btn-create" onclick="publishStory()">Опубликовать</button>
        </div>
        <div id="screen-story" class="screen"><div id="full-story-render"></div></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://rlscraalizkoqysccteo.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsc2NyYWFsaXprb3F5c2NjdGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMjgzNzAsImV4cCI6MjA5NDkwNDM3MH0.S4LEl8T8Ousp2dT--yWFqhRvVJCzgVYe4Vc21IvHsnM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const mySessionId = localStorage.getItem('cryptext_session') || Math.random().toString(36).substring(3);
        localStorage.setItem('cryptext_session', mySessionId);

        function switchScreen(sId, nId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sId).classList.add('active');
            if(nId) document.getElementById(nId).classList.add('active');
        }

        function showFeed() { switchScreen('screen-feed', 'nav-feed'); loadStories(); }
        function showCreateScreen() { switchScreen('screen-create'); }

        async function loadStories() {
            const { data: stories } = await _supabase.from('stories').select('*');
            document.getElementById('stories-container').innerHTML = stories.map(s => `
                <div class="story-card" onclick="openStory(${s.id})">
                    <div class="story-title">${s.title}</div>
                    <div class="story-meta">Автор: ${s.author}</div>
                </div>
            `).join('');
        }

        async function showFavorites() {
            switchScreen('screen-favs', 'nav-favs');
            const { data: favs } = await _supabase.from('favorites').select('story_id').eq('viewer_ip', mySessionId);
            const favIds = favs.map(f => f.story_id);
            if(favIds.length === 0) { document.getElementById('favs-container').innerHTML = "Список пуст..."; return; }
            
            const { data: stories } = await _supabase.from('stories').select('*').in('id', favIds);
            document.getElementById('favs-container').innerHTML = stories.map(s => `
                <div class="story-card" onclick="openStory(${s.id})"><div class="story-title">${s.title}</div></div>
            `).join('');
        }

        async function toggleFav(id, isFav) {
            if (isFav) await _supabase.from('favorites').delete().eq('story_id', id).eq('viewer_ip', mySessionId);
            else await _supabase.from('favorites').insert([{ story_id: id, viewer_ip: mySessionId }]);
            openStory(id);
        }

        async function openStory(id) {
            switchScreen('screen-story');
            const { data: story } = await _supabase.from('stories').select('*').eq('id', id).single();
            const { data: favs } = await _supabase.from('favorites').select('*').eq('story_id', id);
            const isFav = favs.some(f => f.viewer_ip === mySessionId);
            
            document.getElementById('full-story-render').innerHTML = `
                <button class="nav-btn" onclick="showFeed()">← Назад</button>
                <h1 style="margin: 20px 0;">${story.title}</h1>
                <p>${story.content}</p>
                <div style="margin-top:20px;">
                    <button class="btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav(${story.id}, ${isFav})">⭐ В избранное (${favs.length})</button>
                </div>
            `;
        }

        async function publishStory() {
            const author = document.getElementById('story-author').value;
            const title = document.getElementById('story-title').value;
            const content = document.getElementById('story-text').value;
            if(!title || !content) return alert("Заполни все поля!");
            await _supabase.from('stories').insert([{ title, content, author, creator_session: mySessionId }]);
            alert("Опубликовано!");
            showFeed();
        }

        loadStories();
    </script>
</body>
</html>
