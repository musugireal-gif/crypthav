<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptext — Страшные Истории</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- КРАСОЧНЫЙ ХОРРОР ИНТЕРФЕЙС (CSS) --- */
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #13131a;
            --accent-red: #ff3333;
            --accent-purple: #9d4edd;
            --text-main: #f0f0f5;
            --text-muted: #8a8a98;
            --glow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 1;
        }

        header {
            background: linear-gradient(135deg, #1a0b2e, #0d001a);
            border-bottom: 2px solid var(--accent-purple);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--accent-red);
            text-shadow: var(--glow);
            text-transform: uppercase;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-muted);
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: var(--glow);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--accent-red), #990000);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #ff5555, var(--accent-red));
            color: white;
        }

        .user-badge {
            color: var(--accent-purple);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(157,78,221,0.5);
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        sidebar {
            background-color: var(--panel-bg);
            border: 1px solid #252533;
            border-radius: 8px;
            padding: 1.5rem;
            height: fit-content;
        }

        .sidebar-title {
            font-size: 1.1rem;
            color: var(--text-main);
            border-bottom: 1px solid #252533;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-weight: 500;
        }

        .category-item:hover, .category-item.active {
            background-color: #1c1c27;
            color: var(--accent-red);
            padding-left: 1.25rem;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .view-panel {
            display: none;
            background-color: var(--panel-bg);
            border: 1px solid #252533;
            border-radius: 8px;
            padding: 2rem;
        }

        .view-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            background-color: #0a0a0c;
            border: 1px solid #252533;
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 180px;
        }

        .story-card {
            background-color: var(--panel-bg);
            border: 1px solid #252533;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.3s, border-color 0.3s;
        }

        .story-card:hover {
            transform: translateY(-3px);
            border-color: #35354a;
        }

        .story-title {
            font-size: 1.6rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .story-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            gap: 1.5rem;
        }

        .story-author {
            color: var(--accent-purple);
            font-weight: 600;
        }

        .story-content {
            line-height: 1.6;
            color: #d1d1d6;
            white-space: pre-line;
            margin-bottom: 1.5rem;
        }

        /* --- БЛОК КОММЕНТАРИЕВ --- */
        .comments-section {
            border-top: 1px solid #252533;
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .comments-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .comment-item {
            background-color: #0a0a0c;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            border-left: 3px solid var(--accent-purple);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .comment-author {
            color: var(--accent-red);
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 2px;
        }

        .comment-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .comment-input {
            flex: 1;
            background-color: #0a0a0c;
            border: 1px solid #252533;
            color: white;
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
        }

        .error-msg {
            color: var(--accent-red);
            background-color: rgba(255,51,51,0.1);
            border: 1px solid var(--accent-red);
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .loading-text {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Cryptext</h1>
            <p>Платформа ужасов и жутких историй</p>
        </div>
        <div class="nav-buttons" id="nav-actions"></div>
    </header>

    <div class="container">
        <sidebar>
            <div class="sidebar-title">Навигация</div>
            <ul class="category-list">
                <li class="category-item active" onclick="showFeed()">Все истории</li>
            </ul>
        </sidebar>

        <main>
            <div id="feed-view" class="view-panel active">
                <div id="stories-container">
                    <div class="loading-text">Загрузка историй из облачной базы...</div>
                </div>
            </div>

            <div id="publish-view" class="view-panel">
                <h2 style="margin-bottom: 1.5rem; text-transform: uppercase; color: var(--accent-red);">Поделиться ужасом</h2>
                <div class="form-group">
                    <label>Название истории</label>
                    <input type="text" id="story-title" class="form-control" placeholder="Назови свой кошмар...">
                </div>
                <div class="form-group">
                    <label>Текст истории</label>
                    <textarea id="story-content" class="form-control" placeholder="В темную темную ночь..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="publishStory()">Опубликовать в облако</button>
                <button class="btn" onclick="showFeed()" style="margin-left: 0.5rem;">Отмена</button>
            </div>

            <div id="login-view" class="view-panel">
                <h2 style="margin-bottom: 1.5rem; text-transform: uppercase;">Авторизация</h2>
                <div id="login-error" class="error-msg">Неверное имя пользователя или пароль!</div>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="login-username" class="form-control">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" class="form-control">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Войти</button>
                <button class="btn" onclick="showFeed()" style="margin-left: 0.5rem;">Назад</button>
            </div>

            <div id="register-view" class="view-panel">
                <h2 style="margin-bottom: 1.5rem; text-transform: uppercase;">Создать аккаунт</h2>
                <div id="register-error" class="error-msg">Пользователь с таким именем уже существует!</div>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="register-username" class="form-control" placeholder="Придумай ник...">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="register-password" class="form-control" placeholder="Минимум 4 знака...">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Зарегистрироваться</button>
                <button class="btn" onclick
